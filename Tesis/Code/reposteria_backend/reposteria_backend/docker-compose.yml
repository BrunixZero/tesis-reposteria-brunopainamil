services:
  db:
    image: postgres:15
    container_name: reposteria-db
    environment:
      POSTGRES_USER: bruno
      POSTGRES_PASSWORD: tesis2026
      POSTGRES_DB: reposteria_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bruno -d reposteria_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: reposteria-api
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bruno:tesis2026@db:5432/reposteria_db
      SECRET_KEY: cambia_esto_en_produccion_por_algo_largo
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: